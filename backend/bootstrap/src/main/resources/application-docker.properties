#Profile for launching the .java app on developer container

# DB config
spring.datasource.url=jdbc:mysql://${DOCKER_DB_HOSTNAME}:${DOCKER_DB_PORT}/${DB_NAME}?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}

# MQTT broker config
mqtt.broker.url=tcp://${DOCKER_MQTT_HOSTNAME}:${DOCKER_MQTT_PORT}

# ?
spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=validate

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=true
logging.level.org.hibernate.orm.jdbc.bind=trace
logging.level.org.springframework.web=debug

# Sähköpostiasetukset (Mailtrap)
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=e2094cbf772cff

spring.mail.password=e8ecfac2a3a182
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

